<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELO Sorter</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#090912">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">

  <!-- 테마 초기화 (FOUC 방지): React 로드 전에 data-theme 설정 -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var theme = (saved === 'light' || saved === 'dark')
          ? saved
          : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.dataset.theme = theme;
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>

  <!-- Spotify SDK가 React보다 먼저 로드돼도 에러 안 나도록 콜백을 선점 -->
  <script>
    window.onSpotifyWebPlaybackSDKReady = function () {
      window.__spotifySdkReady = true;
      window.dispatchEvent(new Event('spotify-sdk-ready'));
    };
  </script>
  <script src="https://sdk.scdn.co/spotify-player.js" async></script>
</head>
<body>
  <div id="root"></div>
  <div id="toast"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
